<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Literasi AI</title>
    <style>
      :root {
        --bg-start: #0d255a;
        --bg-end: #4b6cb7;
        --surface: rgba(255, 255, 255, 0.96);
        --accent: #5f8cf8;
        --accent-dark: #3d6be3;
        --text: #152033;
        --muted: #6b7c9a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        display: grid;
        place-items: center;
        background:
          radial-gradient(
            circle at top,
            rgba(255, 255, 255, 0.16),
            transparent 28%
          ),
          linear-gradient(135deg, var(--bg-start), var(--bg-end));
        color: var(--text);
      }

      .register-container {
        width: min(460px, calc(100% - 32px));
        padding: 36px;
        border-radius: 28px;
        background: var(--surface);
        box-shadow: 0 32px 82px rgba(8, 27, 71, 0.18);
        border: 1px solid rgba(255, 255, 255, 0.35);
        backdrop-filter: blur(14px);
      }

      .register-header {
        text-align: center;
        margin-bottom: 28px;
      }

      .register-logo {
        width: 64px;
        height: 64px;
        margin: 0 auto 16px;
        border-radius: 18px;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #fff, #e8efff);
        color: var(--bg-start);
        font-size: 1.6rem;
        font-weight: 700;
        box-shadow: 0 14px 30px rgba(27, 50, 90, 0.14);
      }

      .register-title {
        margin: 0;
        font-size: 2rem;
        letter-spacing: -0.04em;
      }

      .register-subtitle {
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 0.95rem;
      }

      form {
        display: grid;
        gap: 18px;
      }

      label {
        display: grid;
        gap: 10px;
        font-size: 0.93rem;
        color: var(--muted);
      }

      input {
        width: 100%;
        padding: 14px 16px;
        border-radius: 16px;
        border: 1px solid rgba(100, 119, 173, 0.28);
        background: #f7fbff;
        color: var(--text);
        font-size: 1rem;
        outline: none;
        transition:
          border-color 0.2s ease,
          box-shadow 0.2s ease;
      }

      input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 4px rgba(95, 140, 248, 0.12);
      }

      button {
        width: 100%;
        padding: 15px 18px;
        border: none;
        border-radius: 16px;
        background: linear-gradient(135deg, var(--accent), var(--accent-dark));
        color: white;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
        box-shadow: 0 18px 32px rgba(63, 95, 200, 0.2);
      }

      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 22px 38px rgba(63, 95, 200, 0.28);
      }

      .login-link {
        margin-top: 22px;
        text-align: center;
        font-size: 0.95rem;
        color: var(--muted);
      }

      .login-link a {
        color: var(--accent-dark);
        text-decoration: none;
        font-weight: 600;
      }

      .login-link a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="register-container">
      <div class="register-header">
        <div class="register-logo">AI</div>
        <h1 class="register-title">Buat Akun</h1>
        <p class="register-subtitle">
          Gabung sekarang untuk mendapatkan akses ke pembelajaran AI interaktif.
        </p>
      </div>

      <form id="registerForm">
        <label>
          Username
          <input
            type="text"
            id="username"
            placeholder="Masukkan username"
            required
          />
        </label>
        <label>
          Password
          <input
            type="password"
            id="password"
            placeholder="Masukkan password"
            required
          />
        </label>
        <button type="submit">Daftar Sekarang</button>
      </form>

      <div class="login-link">
        Sudah punya akun? <a href="login.html">Login di sini</a>
      </div>
    </div>

    <script>
      const form = document.getElementById("registerForm");

      form.addEventListener("submit", async (e) => {
        e.preventDefault(); // Biar gak refresh halaman

        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;

        // Kirim data ke backend (API yang tadi kita buat)
        try {
          const res = await fetch("/auth/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
          });

          const data = await res.json();

          if (res.ok) {
            alert("Wah, Berhasil! Sekarang silakan login ya.");
            window.location.href = "login.html"; // Pindah ke halaman login
          } else {
            alert("Duh, Gagal: " + data.msg);
          }
        } catch (error) {
          console.error("Error:", error);
          alert("Terjadi kesalahan koneksi ke server.");
        }
      });
    </script>
  </body>
</html>
