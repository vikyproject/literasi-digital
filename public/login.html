<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Literasi AI</title>
    <style>
      :root {
        --page-start: #0d255a;
        --page-end: #4b6cb7;
        --surface: rgba(255, 255, 255, 0.95);
        --accent: #6f91f0;
        --accent-dark: #3b5bc4;
        --text: #152033;
        --muted: #626f8f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        display: grid;
        place-items: center;
        background:
          radial-gradient(
            circle at top,
            rgba(255, 255, 255, 0.18),
            transparent 32%
          ),
          linear-gradient(135deg, var(--page-start), var(--page-end));
        color: var(--text);
      }

      .login-box {
        width: min(420px, calc(100% - 32px));
        background: var(--surface);
        border-radius: 28px;
        padding: 34px;
        box-shadow: 0 24px 80px rgba(9, 30, 66, 0.18);
        border: 1px solid rgba(255, 255, 255, 0.35);
        backdrop-filter: blur(12px);
      }

      .login-header {
        text-align: center;
        margin-bottom: 26px;
      }

      .login-logo {
        width: 62px;
        height: 62px;
        margin: 0 auto 16px;
        border-radius: 18px;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #ffffff, #e8efff);
        color: var(--page-start);
        font-weight: 700;
        font-size: 1.5rem;
        box-shadow: 0 12px 24px rgba(26, 50, 96, 0.14);
      }

      .login-title {
        margin: 0;
        font-size: 1.9rem;
        letter-spacing: -0.03em;
      }

      .login-subtitle {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 0.98rem;
      }

      form {
        display: grid;
        gap: 18px;
      }

      label {
        display: grid;
        gap: 10px;
        font-size: 0.92rem;
        color: var(--muted);
      }

      input {
        width: 100%;
        padding: 14px 16px;
        border-radius: 16px;
        border: 1px solid rgba(101, 119, 171, 0.28);
        background: #f7fbff;
        color: var(--text);
        font-size: 1rem;
        outline: none;
        transition:
          border-color 0.2s ease,
          box-shadow 0.2s ease;
      }

      input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 4px rgba(111, 145, 240, 0.12);
      }

      .form-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      .form-footer a {
        color: var(--accent-dark);
        text-decoration: none;
        font-size: 0.93rem;
      }

      .form-footer a:hover {
        text-decoration: underline;
      }

      button {
        width: 100%;
        padding: 15px 18px;
        border: none;
        border-radius: 16px;
        background: linear-gradient(135deg, #5f8cf8, #3d6be3);
        color: white;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
        box-shadow: 0 18px 30px rgba(63, 95, 200, 0.2);
      }

      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 22px 38px rgba(63, 95, 200, 0.28);
      }

      .register-link {
        margin-top: 20px;
        text-align: center;
        color: var(--muted);
        font-size: 0.95rem;
      }

      .register-link a {
        color: var(--accent-dark);
        text-decoration: none;
        font-weight: 600;
      }

      .register-link a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="login-box">
      <div class="login-header">
        <div class="login-logo">AI</div>
        <h1 class="login-title">Literasi AI</h1>
        <p class="login-subtitle">
          Masuk untuk melanjutkan ke dashboard pembelajaran cerdas.
        </p>
      </div>

      <form id="loginForm">
        <label>
          Username
          <input
            type="text"
            id="username"
            placeholder="Masukkan username"
            required
          />
        </label>
        <label>
          Password
          <input
            type="password"
            id="password"
            placeholder="Masukkan password"
            required
          />
        </label>
        <button type="submit">Masuk</button>
      </form>

      <div class="register-link">
        Belum punya akun? <a href="register.html">Daftar sekarang</a>
      </div>
    </div>

    <script>
      document
        .getElementById("loginForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const username = document.getElementById("username").value;
          const password = document.getElementById("password").value;

          const res = await fetch("/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password }),
          });

          const data = await res.json();
          if (res.ok) {
            // SIMPAN TOKEN KE BROWSER
            localStorage.setItem("token", data.token);
            alert("Login Berhasil! Selamat datang.");
            const target = data.role === "admin" ? "admin.html" : "menu.html";
            window.location.href = target;
          } else {
            alert("Gagal: " + data.msg);
          }
        });
    </script>
  </body>
</html>
